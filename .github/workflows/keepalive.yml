name: Supabase Keepalive

on:
  schedule:
    # Twice daily: Supabase free tier pauses after 7 days without database
    # activity, and a paused project cannot be revived by this ping — only
    # restored from the dashboard. Extra margin costs nothing.
    - cron: '0 3,15 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit keepalive endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://totalaud.io/api/keepalive)
          echo "HTTP $response"
          cat /tmp/body
          if [ "$response" != "200" ]; then
            exit 1
          fi
