name: Supabase Keepalive

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit keepalive endpoint
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://totalaud.io/api/keepalive)
          echo "HTTP $response"
          cat /tmp/body
          if [ "$response" != "200" ]; then
            exit 1
          fi
