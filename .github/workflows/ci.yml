name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm turbo typecheck --filter=aud-web

      - name: Test
        run: pnpm test

      - name: Build
        # Falls back to placeholder values when secrets are not available
        # (Dependabot PRs and forks do not receive repo secrets by design).
        # The placeholders only need to satisfy build-time env-var validation;
        # nothing connects to Supabase during turbo build.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key-for-build-only' }}
        run: pnpm turbo build --filter=aud-web

      - name: Security audit
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true
